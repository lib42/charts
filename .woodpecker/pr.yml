---
steps:
  pr-lint:
    image: alpine/helm@sha256:e7ecbf4a200dea73d64bfb8cb0936829164945f2b4d02a0274093073ee8d264f
    environment:
      USE_SSH: "true"
      GIT_USER: $DRONE_COMMIT_AUTHOR
    commands:
    - git fetch --all
    - "export CHART=$(git diff --name-only origin/main | awk -F/ '/^charts/ { print $$2 }' | head -n1)"
    - "echo Chart: $${CHART}"
    - |
      RET=0
      if [ -n "$$CHART" ] ; then
        cd charts/$${CHART}
        helm dependency build
        helm lint
        RET=$?
      fi
      exit $$RET
    when:
      - event: [ "pull_request" ]
        path:
        - charts/**
